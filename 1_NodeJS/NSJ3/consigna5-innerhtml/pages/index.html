<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consigna 5 - Component Lab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link id="theme-light" rel="stylesheet" href="/styles/light.css">
    <link id="theme-dark" rel="stylesheet" href="/styles/dark.css" disabled>
</head>
<body>
    <header class="py-3 shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-braces-asterisk text-primary fs-3"></i>
                <h1 class="h4 mb-0 fw-bold">Inyector de Componentes</h1>
            </div>
            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-pill">
                <i class="bi bi-moon-stars"></i>
            </button>
        </div>
    </header>

    <main class="container py-4">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h5 class="fw-bold mb-3">Biblioteca de UI</h5>
                    <p class="text-muted small mb-4">Seleccioná un componente para inyectarlo dinámicamente en el DOM vía InnerHTML.</p>
                    
                    <div class="d-flex flex-column gap-3">
                        <button id="btn-lista" class="btn btn-outline-primary py-3 text-start d-flex align-items-center justify-content-between">
                            <span><i class="bi bi-list-ul me-2"></i>Lista de Tareas</span>
                            <i class="bi bi-plus-lg small"></i>
                        </button>
                        <button id="btn-tabla" class="btn btn-outline-secondary py-3 text-start d-flex align-items-center justify-content-between">
                            <span><i class="bi bi-table me-2"></i>Tabla de Datos</span>
                            <i class="bi bi-plus-lg small"></i>
                        </button>
                        <button id="btn-alerta" class="btn btn-outline-info py-3 text-start d-flex align-items-center justify-content-between">
                            <span><i class="bi bi-info-circle me-2"></i>Alerta de Sistema</span>
                            <i class="bi bi-plus-lg small"></i>
                        </button>
                        <hr class="my-2">
                        <button id="btn-limpiar" class="btn btn-danger py-3 fw-bold">
                            <i class="bi bi-trash3 me-2"></i>Limpiar Espacio
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-transparent border-0 pt-4 px-4">
                        <h5 class="fw-bold mb-0">Canvas de Visualización</h5>
                    </div>
                    <div class="card-body p-4">
                        <div id="display" class="border border-2 border-dashed rounded-4 p-4 min-vh-50 bg-light-subtle transition-all overflow-auto">
                            <div class="h-100 d-flex flex-column align-items-center justify-content-center opacity-25">
                                <i class="bi bi-columns-gap fs-1 mb-2"></i>
                                <p>El contenido se renderizará aquí</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/scripts/main.js"></script>
</body>
</html>
