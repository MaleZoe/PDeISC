<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos de Teclado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/estilos-globales.css">
  <link rel="stylesheet" href="/styles/estilos-paginas.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">NJS3 — Proyecto 2</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navCollapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-mouse">Mouse</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-teclado">Teclado</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-formulario">Formularios</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-ventana">Ventana</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-tiempo">Tiempo</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5 fadeIn">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="texto-primario fw-bold">⌨️ Eventos de Teclado</h1>
        <p class="text-muted mb-0">Escribe, usa comandos como Ctrl+S o usa Escape en el área.</p>
      </div>
      <a href="/" class="btn btn-volver">← Volver al inicio</a>
    </div>

    <div id="areaDemo" class="p-4 bg-superficie rounded shadow-sm mb-4 border border-secondary text-start">
      <div class="mb-3">
        <label for="entradaTexto" class="form-label text-light fw-bold fs-5">Área de escritura</label>
        <textarea id="entradaTexto" class="form-control form-control-lg bg-dark text-light border-secondary" rows="4"></textarea>
      </div>
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="log-info-teclas">
          <span id="badgeKey" class="badge rounded-pill bg-primario fs-6">Tecla: -</span>
          <span id="badgeCode" class="badge rounded-pill bg-secundario text-dark fs-6">Código: -</span>
          <span id="badgeCtrl" class="badge rounded-pill bg-neutral fs-6 opacity-30">Ctrl</span>
          <span id="badgeAlt" class="badge rounded-pill bg-neutral fs-6 opacity-30">Alt</span>
          <span id="badgeShift" class="badge rounded-pill bg-neutral fs-6 opacity-30">Shift</span>
        </div>
        <div id="contador" class="text-info font-mono">0 caracteres, 0 palabras</div>
      </div>
    </div>

    <div class="card bg-superficie border-secondary rounded shadow-sm">
      <div class="card-header bg-dark d-flex justify-content-between align-items-center">
        <span class="fw-bold fs-5">Registro de Eventos</span>
        <button id="btnLimpiar" class="btn btn-sm btn-outline-danger">Limpiar registro</button>
      </div>
      <div id="panelLog" class="card-body panel-consola text-light text-start"></div>
    </div>
    <div id="contenedorToasts" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="/scripts/navbar.js" defer></script>
  <script src="/scripts/eventos-teclado.js" defer></script>
</body>
</html>
