<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos de Mouse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/estilos-globales.css">
  <link rel="stylesheet" href="/styles/estilos-paginas.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">NJS3 — Proyecto 2</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navCollapse">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navCollapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-mouse">Mouse</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-teclado">Teclado</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-formulario">Formularios</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-ventana">Ventana</a></li>
          <li class="nav-item"><a class="nav-link" href="/eventos-tiempo">Tiempo</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5 fadeIn">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="texto-primario fw-bold">🖱️ Eventos de Mouse</h1>
        <p class="text-muted mb-0">Interactúa con el recuadro inferior usando clics y moviendo el cursor.</p>
      </div>
      <a href="/" class="btn btn-volver">← Volver al inicio</a>
    </div>

    <div id="areaDemo" class="area-mouse d-flex justify-content-center align-items-center mb-4 rounded shadow-sm position-relative overflow-hidden">
      <div id="coordsBadge" class="badge bg-dark fs-5 shadow">Mueve el mouse aquí</div>
      <div id="tooltip" class="d-none">Menú contextual personalizado cancelado.</div>
    </div>

    <div class="card bg-superficie border-secondary rounded shadow-sm">
      <div class="card-header bg-dark d-flex justify-content-between align-items-center">
        <span class="fw-bold fs-5">Registro de Eventos</span>
        <button id="btnLimpiar" class="btn btn-sm btn-outline-danger">Limpiar registro</button>
      </div>
      <div id="panelLog" class="card-body panel-consola text-light text-start"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="/scripts/navbar.js" defer></script>
  <script src="/scripts/eventos-mouse.js" defer></script>
</body>
</html>
