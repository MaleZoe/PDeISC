<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consigna 1 - Premium Design</title>
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- estilos propios -->
    <link id="theme-light" rel="stylesheet" href="/styles/light.css">
    <link id="theme-dark" rel="stylesheet" href="/styles/dark.css" disabled>
</head>
<body>
    <header class="py-3 shadow-sm border-0 glass">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                
                <h1 class="h4 mb-0 fw-bold tracking-tight">Consigna 1</h1>
            </div>
            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-pill border-0 shadow-none">
                <i class="bi bi-moon-stars"></i>
            </button>
        </div>
    </header>

    <main class="container-fluid py-4">
        <div class="row g-4">
            <!-- Left Panel: Controls -->
            <div class="col-lg-3">
                <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 100px;">
                    <div class="mb-4">
                        <h5 class="fw-bold mb-1">Panel de Control</h5>
                        <p class="text-muted small">Manipulá el DOM en tiempo real.</p>
                    </div>
                    
                    <div class="d-grid gap-3">
                        <div class="control-group">
                            <label class="small fw-bold text-uppercase text-muted mb-2 d-block tracking-wider">Elementos H1</label>
                            <div class="d-grid gap-2">
                                <button id="btn-add-h1" class="btn btn-primary text-start">
                                    <i class="bi bi-plus-circle me-2"></i>Agregar H1
                                </button>
                                <button id="btn-change-text" class="btn btn-outline-warning text-start" style="display: none;">
                                    <i class="bi bi-type me-2"></i>Cambiar Texto
                                </button>
                                <button id="btn-change-color" class="btn btn-outline-info text-start" style="display: none;">
                                    <i class="bi bi-palette me-2"></i>Color H1
                                </button>
                            </div>
                        </div>

                        <hr class="my-2 opacity-50">

                        <div class="control-group">
                            <label class="small fw-bold text-uppercase text-muted mb-2 d-block tracking-wider">Multimedia</label>
                            <div class="d-grid gap-2">
                                <button id="btn-add-img" class="btn btn-primary text-start">
                                    <i class="bi bi-image me-2"></i>Insertar Foto
                                </button>
                                <button id="btn-change-img" class="btn btn-outline-warning text-start" style="display: none;">
                                    <i class="bi bi-arrow-repeat me-2"></i>Siguiente Imagen
                                </button>
                                <button id="btn-resize-img" class="btn btn-outline-info text-start" style="display: none;">
                                    <i class="bi bi-aspect-ratio me-2"></i>Alternar Tamaño
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Preview Area -->
            <div class="col-lg-9">
                <div class="card border-0 shadow-lg h-100 min-vh-75 d-flex flex-column">
                    <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-end align-items-center">
                        <div class="d-flex gap-2">
                            <div class="rounded-circle bg-light border" style="width: 12px; height: 12px;"></div>
                            <div class="rounded-circle bg-light border" style="width: 12px; height: 12px;"></div>
                        </div>
                    </div>
                    <div class="card-body d-flex flex-column align-items-center justify-content-center flex-grow-1 p-3 p-md-5 overflow-auto">
                        <div id="container-h1" class="text-center w-100 floating">
                            <!-- Empty state if nothing added -->
                            <div class="empty-state opacity-25">
                                <i class="bi bi-layers fs-1"></i>
                                <p class="mt-2">El canvas está vacío</p>
                            </div>
                        </div>
                        <div id="container-img" class="text-center w-100 mt-4 d-flex justify-content-center"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/scripts/main.js"></script>
</body>
</html>
