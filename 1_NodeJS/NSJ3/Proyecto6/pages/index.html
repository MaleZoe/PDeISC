<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro y Perfil — Proyecto 6</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/public/styles/estilos-globales.css">
  <link rel="stylesheet" href="/public/styles/estilos-formulario.css">
  <link rel="stylesheet" href="/public/styles/estilos-perfil.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4" id="navbarPrincipal">
    <div class="container">
      <span class="navbar-brand">NJS3 — Proyecto 6</span>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar" aria-controls="menuNavbar" aria-expanded="false" aria-label="Alternar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
  </nav>

  <main class="container mb-5">
    
    <div class="layout-formulario-perfil">
      
      <section class="columna-formulario">
        
        <div class="indicador-pasos">
          <div class="paso" data-seccion="seccion-personal">
            <span class="paso-numero">1</span>
            <span class="paso-etiqueta">Datos Personales</span>
          </div>
        </div>

        <form id="formularioRegistro" novalidate>
          
          <fieldset id="seccion-personal" class="mb-5">
            <legend class="h4 mb-4" style="color: var(--color-acento);">Datos Personales</legend>
            
            <div class="row">
              <div class="col-md-6">
                <div class="campo-flotante">
                  <input type="text" id="inp-nombre" name="nombre" placeholder=" " required aria-describedby="error-inp-nombre">
                  <label for="inp-nombre">Nombre *</label>
                  <span id="error-inp-nombre" class="mensaje-validacion" role="alert" aria-live="polite"></span>
                </div>
              </div>
              <div class="col-md-6">
                <div class="campo-flotante">
                  <input type="text" id="inp-apellido" name="apellido" placeholder=" " required aria-describedby="error-inp-apellido">
                  <label for="inp-apellido">Apellido *</label>
                  <span id="error-inp-apellido" class="mensaje-validacion" role="alert" aria-live="polite"></span>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="campo-flotante">
                  <input type="date" id="inp-fecha" name="fechaNacimiento" placeholder=" " required aria-describedby="error-inp-fecha">
                  <label for="inp-fecha">Fecha de nacimiento *</label>
                  <span id="error-inp-fecha" class="mensaje-validacion" role="alert" aria-live="polite"></span>
                </div>
              </div>
              <div class="col-md-6">
                <div class="campo-flotante">
                  <input type="text" id="inp-telefono" name="telefono" placeholder=" " aria-describedby="error-inp-telefono">
                  <label for="inp-telefono">Teléfono</label>
                  <span id="error-inp-telefono" class="mensaje-validacion" role="alert" aria-live="polite"></span>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="d-block mb-2 text-muted" style="font-size: 0.9rem;">Género *</label>
              <div class="radio-grupo">
                <label class="radio-opcion">
                  <input type="radio" name="genero" value="masculino" required>
                  <span>Masculino</span>
                </label>
                <label class="radio-opcion">
                  <input type="radio" name="genero" value="femenino">
                  <span>Femenino</span>
                </label>
                <label class="radio-opcion">
                  <input type="radio" name="genero" value="no-binario">
                  <span>No binario</span>
                </label>
                <label class="radio-opcion">
                  <input type="radio" name="genero" value="prefiero-no-decir">
                  <span>Prefiero no decir</span>
                </label>
              </div>
              <span id="error-radio-genero" class="mensaje-validacion" role="alert" aria-live="polite"></span>
            </div>

          </fieldset>

          <div class="acciones-formulario d-flex gap-3 align-items-center mt-5 pt-3 border-top">
            <button type="submit" id="btnEnviar" class="btn-enviar" disabled>
              Crear Perfil →
            </button>
            <button type="reset" id="btnLimpiar" class="btn-limpiar btn btn-link text-muted text-decoration-none">
              Limpiar formulario
            </button>
          </div>

        </form>
      </section>

      <section class="columna-perfil">
        <div id="estadoVacio" class="estado-vacio">
          <span class="estado-vacio-icono">👤</span>
          <p>Completá el formulario para ver tu perfil aquí.</p>
        </div>
        
        <div id="contenedorPerfil" class="contenedor-perfil">
          
        </div>
      </section>

    </div>
  </main>

  <div id="toastNotificacion" class="toast-notificacion oculto" aria-live="polite"></div>

  <script src="/scripts/navbar.js" defer></script>
  <script src="/scripts/validador.js" defer></script>
  <script src="/scripts/perfil.js" defer></script>
  <script src="/scripts/formulario.js" defer></script>

</body>
</html>
