<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Builder - Proyecto 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/estilos.css">
</head>
<body class="bg-dark text-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-gradient">Link Builder & Auditor</h1>
            <p class="lead text-secondary">Gestión dinámica de nodos y atributos</p>
        </header>

        <div class="row g-4">
            <!-- panel de creación -->
            <div class="col-md-6">
                <div class="glass-card p-4 h-100">
                    <h3 class="mb-4 text-info">1. Creación de Nodos</h3>
                    <p class="small text-muted mb-4">Generá 5 enlaces automáticos con destinos iniciales.</p>
                    <button id="btnCreateLinks" class="btn btn-info w-100 mb-3">Generar 5 Enlaces</button>
                    
                    <div id="linkContainer" class="d-flex flex-column gap-2 p-3 bg-black bg-opacity-25 rounded border border-secondary" style="min-height: 200px;">
                        <!-- acá se inyectan los <a> -->
                        <p class="text-muted italic text-center my-auto">Sin enlaces generados...</p>
                    </div>
                </div>
            </div>

            <!-- panel de modificación y auditoría -->
            <div class="col-md-6">
                <div class="glass-card p-4 h-100">
                    <h3 class="mb-4 text-warning">2. Modificación & Auditoría</h3>
                    <p class="small text-muted mb-4">Cambiá los atributos y mirá el log en tiempo real.</p>
                    <button id="btnModifyLinks" class="btn btn-warning w-100 mb-3" disabled>Modificar Atributos</button>

                    <div class="audit-log bg-dark rounded p-3 font-monospace small border border-secondary" style="height: 200px; overflow-y: auto;">
                        <div id="logContent">
                            <span class="text-muted">> Esperando creación de nodos...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/nodos.js" type="module"></script>
</body>
</html>
