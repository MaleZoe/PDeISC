<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJS3 — Proyecto 4 | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/styles/estilos-globales.css">
    <link rel="stylesheet" href="/public/styles/estilos-app.css">
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand brand-display" href="/">NJS3 — PROYECTO 4</a>
            <button class="navbar-toggler" type="button" id="hamburger">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Restablecer</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main class="container-fluid p-4">
        <div class="layout-tres-columnas">

            <aside class="zona-creacion">
                <section class="mb-4">
                    <h5 class="titulo-seccion">Crear nodos &lt;a&gt;</h5>
                    <div id="controlesCreacion" class="d-grid gap-2">
                    </div>
                </section>
                <section>
                    <h5 class="titulo-seccion">Modificar atributos</h5>
                    <div id="controlesMutacion" class="d-grid gap-3">
                    </div>
                </section>
            </aside>

            <section class="tablero-central">
                <div class="header-tablero d-flex justify-content-between align-items-center mb-3">
                    <h2 class="m-0">Tablero de Nodos</h2>
                    <span class="status-badge">DOM Vivo</span>
                </div>
                <div id="tableroNodos" class="grid-nodos">
                    <div class="placeholder-vacio">Creá un nodo para comenzar →</div>
                </div>
            </section>

          
            <aside class="zona-auditoria">
                <div class="header-auditoria d-flex justify-content-between align-items-center mb-3">
                    <h5 class="m-0">📋 Auditoría</h5>
                    <span id="contadorEventos" class="badge bg-primary">0</span>
                </div>
                <div id="panelAuditoria" class="log-container">
                    <div class="placeholder-log">Las acciones aparecerán aquí...</div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button id="btnLimpiarLog" class="btn btn-sm btn-outline-secondary w-100">Limpiar Auditoría</button>
                </div>
            </aside>
        </div>
    </main>

    <script src="/scripts/navbar.js" defer></script>
    <script src="/scripts/nodos.js" defer></script>
    <script src="/scripts/auditoria.js" defer></script>
    <script src="/scripts/creador.js" defer></script>
    <script src="/scripts/modificador.js" defer></script>
</body>
</html>
