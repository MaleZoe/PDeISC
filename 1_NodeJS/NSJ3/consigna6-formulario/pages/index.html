<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consigna 6 - Modern Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link id="theme-light" rel="stylesheet" href="/styles/light.css">
    <link id="theme-dark" rel="stylesheet" href="/styles/dark.css" disabled>
</head>
<body>
    <header class="py-3 shadow-sm border-0 glass">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <div class="bg-primary bg-gradient p-2 rounded-3 text-white shadow-sm">
                    <i class="bi bi-person-badge-fill fs-4"></i>
                </div>
                <h1 class="h4 mb-0 fw-bold tracking-tight">Registro de Usuarios</h1>
            </div>
            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-pill border-0 shadow-none">
                <i class="bi bi-moon-stars"></i>
            </button>
        </div>
    </header>

    <main class="container-fluid py-4">
        <div class="row g-4">
            <!-- Form Section -->
            <div class="col-xl-3 col-lg-4">
                <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 100px;">
                    <div class="mb-4">
                        <h5 class="fw-bold mb-1">Nueva Inscripción</h5>
                        <p class="text-muted small">Completá los datos para registrarte en el sistema.</p>
                    </div>
                    <form id="form-reg" novalidate>
                        <div class="form-floating mb-3">
                            <input type="text" id="nombre" class="form-control" placeholder="Nombre completo" required>
                            <label for="nombre">Nombre Completo</label>
                            <div class="invalid-feedback" id="err-nombre"></div>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="email" id="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                            <label for="email">Correo Electrónico</label>
                            <div class="invalid-feedback" id="err-email"></div>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" id="legajo" class="form-control" placeholder="Legajo" required>
                                    <label for="legajo">Legajo (Nº)</label>
                                    <div class="invalid-feedback" id="err-legajo"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <select id="materia" class="form-select" required>
                                        <option value="" selected disabled>Seleccioná...</option>
                                        <option value="Desarrollo">Desarrollo</option>
                                        <option value="Redes">Redes</option>
                                        <option value="Sistemas">Sistemas</option>
                                    </select>
                                    <label for="materia">Materia</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-muted mb-2">Género</label>
                            <div class="d-flex gap-3">
                                <div class="form-check custom-radio">
                                    <input class="form-check-input" type="radio" name="gen" id="gen-m" value="M" checked>
                                    <label class="form-check-label" for="gen-m">Masculino</label>
                                </div>
                                <div class="form-check custom-radio">
                                    <input class="form-check-input" type="radio" name="gen" id="gen-f" value="F">
                                    <label class="form-check-label" for="gen-f">Femenino</label>
                                </div>
                            </div>
                        </div>
                        <div class="mb-4">
                            <!-- sección de términos removida por solicitud -->
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
                            <i class="bi bi-check2-circle me-2"></i>Finalizar Registro
                        </button>
                    </form>
                </div>
            </div>

            <!-- List Section -->
            <div class="col-xl-9 col-lg-8">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0">Usuarios Registrados</h5>
                        <span id="counter" class="badge bg-primary-subtle text-primary rounded-pill">0 Usuarios</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light text-muted small text-uppercase">
                                    <tr>
                                        <th class="ps-4 py-3">ID/Legajo</th>
                                        <th class="py-3">Usuario</th>
                                        <th class="py-3">Materia</th>
                                        <th class="py-3 text-end pe-4">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla">
                                    <!-- Empty state -->
                                    <tr id="empty-state">
                                        <td colspan="4" class="text-center py-5">
                                            <i class="bi bi-inbox fs-1 text-muted opacity-25 d-block mb-2"></i>
                                            <p class="text-muted mb-0">No hay registros aún.</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- botón para subir arriba -->
    <button id="scroll-top" class="btn btn-dark position-fixed bottom-0 end-0 m-4 shadow" style="display: none; border-radius: 50%; width: 50px; height: 50px; z-index: 1000;">↑</button>

    <script type="module" src="/scripts/main.js"></script>
</body>
</html>
