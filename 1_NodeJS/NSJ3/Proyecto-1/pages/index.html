<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJS3 — Proyecto 1</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/styles/estilos.css">
</head>
<body class="bg-fondo text-blanco">
  
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 border-bottom border-secundario">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">NJS3 — Proyecto 1</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Alternar navegación">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuPrincipal">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Inicio</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="container text-center mb-5">
    <h1 class="display-5 fw-bold">Interactividad Total con DHTML</h1>
    <p class="lead text-mutado">Manipula el Document Object Model sin recargar la página.</p>
  </header>

  <main class="container">
    <div class="row g-4 mb-4">
      
      <div class="col-12 col-md-4 col-lg-3">
        <div class="panel-botones">
          <button id="btnAgregarH1" class="btn btn-accion-1 text-white p-3 border-0">➕ Agregar H1</button>
          <button id="btnCambiarTexto" class="btn btn-accion-2 text-white p-3 border-0" disabled>📝 Cambiar Texto</button>
          <button id="btnCambiarColor" class="btn btn-accion-3 text-dark p-3 border-0" disabled>🎨 Cambiar Color</button>
          <button id="btnAgregarImagen" class="btn btn-accion-4 text-white p-3 border-0">🖼️ Agregar Imagen</button>
          <button id="btnCambiarImagen" class="btn btn-accion-5 text-white p-3 border-0" disabled>🔄 Cambiar Imagen</button>
          <button id="btnCambiarTamanio" class="btn btn-accion-6 text-white p-3 border-0" disabled>📏 Cambiar Tamaño</button>
        </div>
      </div>
      
      <div class="col-12 col-md-8 col-lg-9">
        <div id="areaVisualizacion">
        
        </div>
      </div>
      
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  
  <script src="/scripts/dom.js" defer></script>
</body>
</html>
