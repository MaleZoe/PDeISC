<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estanga Lab - Proyecto 1</title>
    <!-- bootstrap para que no sea un asco en el celular -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <!-- mis estilos prolijos -->
    <link rel="stylesheet" href="../styles/estilos.css">
</head>
<body class="bg-dark text-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-gradient">Laboratorio DOM</h1>
            <p class="lead text-secondary">Manipulación de nodos y eventos - Método Estanga</p>
        </header>

        <main class="row justify-content-center">
            <div class="col-md-8">
                <!-- zona de control -->
                <div class="glass-card p-4 mb-4">
                    <h5 class="mb-3">Controles del DOM</h5>
                    <div class="d-flex flex-wrap gap-2">
                        <button id="btnAddH1" class="btn btn-primary">Agregar H1</button>
                        <button id="btnChangeText" class="btn btn-outline-info">Cambiar Texto</button>
                        <button id="btnChangeColor" class="btn btn-outline-warning">Cambiar Color</button>
                        <button id="btnAddImg" class="btn btn-success">Agregar Imagen</button>
                        <button id="btnChangeImg" class="btn btn-outline-success">Cambiar Imagen</button>
                        <button id="btnResizeImg" class="btn btn-outline-danger">Cambiar Tamaño</button>
                    </div>
                </div>

                <!-- zona de renderizado -->
                <div id="renderZone" class="glass-card p-5 text-center min-vh-25 d-flex flex-column align-items-center justify-content-center">
                    <p class="text-muted italic">Acá va a pasar la magia...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- scripts al final para que no rompa las bolas -->
    <script src="../scripts/dom-basic.js" type="module"></script>
</body>
</html>
