<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consigna 4 - Gestor de Atributos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link id="theme-light" rel="stylesheet" href="/styles/light.css">
    <link id="theme-dark" rel="stylesheet" href="/styles/dark.css" disabled>
</head>
<body>
    <header class="py-3 shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 fw-bold">Gestor de Atributos</h1>
            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-pill" aria-label="Cambiar tema">
                <i class="bi bi-moon-stars"></i>
            </button>
        </div>
    </header>

    <main class="container py-4">
        <div class="d-flex flex-wrap gap-2 mb-4">
            <button id="btn-crear" class="btn btn-primary">Crear nodos</button>
            <button id="btn-modificar" class="btn btn-secondary" disabled>Modificar atributos</button>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <h2 class="h6 fw-bold mb-3">Nodos generados</h2>
                <div id="nodos-container" class="d-flex flex-column gap-3">
                    <p id="nodos-vacio" class="text-muted small mb-0">Presioná "Crear nodos" para generar los 5 elementos.</p>
                </div>
            </div>

            <div class="col-lg-6">
                <h2 class="h6 fw-bold mb-3">Cambios realizados</h2>
                <div id="cambios-panel" class="card border-0 shadow-sm p-3">
                    <p id="cambios-vacio" class="text-muted small mb-0">Acá se mostrarán el atributo modificado y el cambio de cada nodo.</p>
                    <ul id="cambios-lista" class="list-unstyled mb-0"></ul>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/scripts/main.js"></script>
</body>
</html>
