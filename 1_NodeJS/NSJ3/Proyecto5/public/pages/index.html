<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Injector - Proyecto 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/estilos.css">
</head>
<body class="bg-dark text-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-gradient">Template Injector</h1>
            <p class="lead text-secondary">Inserción de objetos complejos mediante InnerHTML</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-md-10">
                <!-- panel de control -->
                <div class="glass-card p-4 mb-4 text-center">
                    <h5 class="mb-3">Elegí qué inyectar:</h5>
                    <div class="d-flex flex-wrap justify-content-center gap-2">
                        <button class="btn btn-outline-primary inject-btn" data-type="card">Inyectar Tarjeta</button>
                        <button class="btn btn-outline-success inject-btn" data-type="table">Inyectar Tabla</button>
                        <button class="btn btn-outline-info inject-btn" data-type="list">Inyectar Lista</button>
                        <button class="btn btn-outline-warning inject-btn" data-type="alert">Inyectar Alerta Custom</button>
                        <button id="btnClear" class="btn btn-danger">Limpiar Todo</button>
                    </div>
                </div>

                <!-- contenedor de inyección -->
                <div id="injectionContainer" class="glass-card p-5 min-vh-50 d-flex flex-column gap-4">
                    <p class="text-muted italic text-center">Esperando inyección de contenido...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/inner.js" type="module"></script>
</body>
</html>
