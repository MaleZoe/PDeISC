<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Cálculos Simples</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link id="theme-link" rel="stylesheet" href="../styles/claro.css">
</head>
<body>
    <header class="container-fluid py-3 border-bottom">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0">Ejercicio 2</h1>
            <button id="theme-toggle" class="btn btn-secondary btn-sm" aria-label="Cambiar modo">☀️🌙</button>
        </div>
    </header>

    <main class="container mt-5">
        <h2 class="mb-4">Resultados de los cálculos</h2>
        <div class="row g-3">
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h5>Suma</h5>
                    <p>4 + 5 = 9</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h5>Resta</h5>
                    <p>3 - 6 = -3</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h5>Multiplicación</h5>
                    <p>2 * 7 = 14</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h5>División</h5>
                    <p>20 / 4 = 5</p>
                </div>
            </div>
        </div>
    </main>

    <button id="btn-scroll-top" class="btn btn-primary position-fixed bottom-0 end-0 m-4" style="display: none;">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../scripts/main.js"></script>
</body>
</html>
