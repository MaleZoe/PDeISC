<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telefe Clima - Viento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos Personalizados Telefe -->
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <menu-placeholder></menu-placeholder>

  <main class="container my-5 text-center">
    <h1 class="display-4 fw-bold text-dark mb-5" id="wind-alert-header">ALERTA DE VIENTO</h1>
    <div class="row g-4 justify-content-center">
      <div class="col-md-6">
        <div class="card telefe-card p-5 shadow-sm text-center">
          <div class="card-body">
            <h5 class="fw-bold text-blue mb-4">VELOCIDAD Y DIRECCIÓN</h5>
            <div class="display-1 fw-bold mb-3">{{WIND_SPEED}}</div>
            <p class="fs-4 text-muted">Viento del {{WIND_DIRECTION}}</p>
            <hr class="my-4">
            <p class="lead mb-4" id="wind-chill-result">La sensación térmica calculada es: <strong>{{WEATHER_RESULT}}</strong></p>
            <div class="alert alert-warning rounded-pill py-3 px-5 border-0 shadow-sm" style="display: inline-block;">
              <strong>PRECAUCIÓN:</strong> Se recomienda evitar actividades en zonas elevadas.
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center border-top bg-white mt-5">
    <div class="container">
      <p class="mb-0 text-muted">&copy; 2026 Telefe Noticias - Todos los derechos reservados.</p>
      <p class="small text-secondary" id="server-time-footer">{{SERVER_TIME}}</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
