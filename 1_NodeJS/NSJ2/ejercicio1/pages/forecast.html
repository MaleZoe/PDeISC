<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telefe Clima - Pronóstico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos Personalizados Telefe -->
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <menu-placeholder></menu-placeholder>

  <main class="container my-5 text-center">
    <h1 class="display-4 fw-bold text-dark mb-5">PRONÓSTICO EXTENDIDO</h1>
    <div class="row g-4 justify-content-center">
      <div class="col-md-2 col-6">
        <div class="card telefe-card p-3 h-100 shadow-sm">
          <div class="day-icon text-warning">☀️</div>
          <h5 class="fw-bold text-blue mb-2">LUN</h5>
          <p class="fs-4 fw-bold mb-0">28°C</p>
          <p class="small text-muted">18°C</p>
        </div>
      </div>
      <div class="col-md-2 col-6">
        <div class="card telefe-card p-3 h-100 shadow-sm">
          <div class="day-icon text-info">⛅</div>
          <h5 class="fw-bold text-blue mb-2">MAR</h5>
          <p class="fs-4 fw-bold mb-0">25°C</p>
          <p class="small text-muted">15°C</p>
        </div>
      </div>
      <div class="col-md-2 col-6">
        <div class="card telefe-card p-3 h-100 shadow-sm">
          <div class="day-icon text-secondary">☁️</div>
          <h5 class="fw-bold text-blue mb-2">MIE</h5>
          <p class="fs-4 fw-bold mb-0">22°C</p>
          <p class="small text-muted">12°C</p>
        </div>
      </div>
      <div class="col-md-2 col-6">
        <div class="card telefe-card p-3 h-100 shadow-sm">
          <div class="day-icon text-primary">🌧️</div>
          <h5 class="fw-bold text-blue mb-2">JUE</h5>
          <p class="fs-4 fw-bold mb-0">19°C</p>
          <p class="small text-muted">10°C</p>
        </div>
      </div>
      <div class="col-md-2 col-6">
        <div class="card telefe-card p-3 h-100 shadow-sm">
          <div class="day-icon text-danger">⛈️</div>
          <h5 class="fw-bold text-blue mb-2">VIE</h5>
          <p class="fs-4 fw-bold mb-0">18°C</p>
          <p class="small text-muted">9°C</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center border-top bg-white mt-5">
    <div class="container">
      <p class="mb-0 text-muted">&copy; 2026 Telefe Noticias - Todos los derechos reservados.</p>
      <p class="small text-secondary" id="server-time-footer">{{SERVER_TIME}}</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
