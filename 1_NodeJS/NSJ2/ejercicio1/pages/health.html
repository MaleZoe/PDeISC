<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telefe Clima - Salud UV</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos Personalizados Telefe -->
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <menu-placeholder></menu-placeholder>

  <main class="container my-5 text-center">
    <h1 class="display-4 fw-bold text-dark mb-5">SOL Y SALUD UV</h1>
    <div class="row g-4 justify-content-center">
      <div class="col-md-8">
        <div class="card telefe-card p-5 shadow-sm text-center">
          <div class="card-body">
            <h5 class="fw-bold text-blue mb-5 text-uppercase">ÍNDICE DE RADIACIÓN ULTRAVIOLETA</h5>
            
            <div class="uv-circle mb-5 shadow-sm" id="uv-circle">
              <div class="uv-level" id="uv-intensity">0</div>
              <div class="uv-label" id="uv-level-label">Bajo</div>
            </div>

            <div class="p-4 rounded-4 bg-light border-0 mb-4">
              <h4 class="fw-bold text-dark mb-3">RECOMENDACIÓN</h4>
              <p class="lead text-muted mb-0" id="uv-recommendation">Sin datos disponibles</p>
            </div>

            <p class="text-secondary small">La intensidad UV es mayor entre las 11:00 y las 16:00 horas.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center border-top bg-white mt-5">
    <div class="container">
      <p class="mb-0 text-muted">&copy; 2026 Telefe Noticias - Todos los derechos reservados.</p>
      <p class="small text-secondary" id="server-time-footer">{{SERVER_TIME}}</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
