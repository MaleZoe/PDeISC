<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telefe Clima - Histórico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos Personalizados Telefe -->
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <menu-placeholder></menu-placeholder>

  <main class="container my-5 text-center">
    <h1 class="display-4 fw-bold text-dark mb-5">DATOS CLIMÁTICOS HISTÓRICOS</h1>
    <div class="row g-4 justify-content-center">
      <div class="col-md-10">
        <div class="card telefe-card p-5 shadow-sm text-center">
          <div class="table-responsive">
            <table class="table table-hover table-striped mb-0">
              <thead>
                <tr>
                  <th scope="col" class="py-3 px-4 border-0">Ciudad</th>
                  <th scope="col" class="py-3 px-4 border-0">País</th>
                  <th scope="col" class="py-3 px-4 border-0">Temp. Prom. Anual (°C)</th>
                  <th scope="col" class="py-3 px-4 border-0">Máxima Histórica (°C)</th>
                  <th scope="col" class="py-3 px-4 border-0">Precipitación (mm)</th>
                </tr>
              </thead>
              <tbody>
                <tr><td class="py-3 px-4">Buenos Aires</td><td class="py-3 px-4">Argentina</td><td class="py-3 px-4">17.6</td><td class="py-3 px-4">39.0</td><td class="py-3 px-4">1200</td></tr>
                <tr><td class="py-3 px-4">Madrid</td><td class="py-3 px-4">España</td><td class="py-3 px-4">15.0</td><td class="py-3 px-4">42.0</td><td class="py-3 px-4">450</td></tr>
                <tr><td class="py-3 px-4">Santiago</td><td class="py-3 px-4">Chile</td><td class="py-3 px-4">14.5</td><td class="py-3 px-4">38.0</td><td class="py-3 px-4">300</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center border-top bg-white mt-5">
    <div class="container">
      <p class="mb-0 text-muted">&copy; 2026 Telefe Noticias - Todos los derechos reservados.</p>
      <p class="small text-secondary" id="server-time-footer">{{SERVER_TIME}}</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
