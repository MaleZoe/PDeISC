<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ejercicio 1 - GET con Fetch y Axios desde la API local de usuarios">
    <title>Ejercicio 1 — GET con Fetch y Axios</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>

    <!-- header -->
    <header class="site-header">
        <a href="/" class="header-brand">
            <div class="logo-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
            </div>
            <span>JS4</span>
        </a>
        <div class="header-actions">
            <button class="btn-theme" id="btn-tema">Tema</button>
        </div>
    </header>

    <!-- hero -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-badge">Ejercicio 1</div>
            <h1>GET con Fetch y Axios</h1>
            <p>Obtener los usuarios de la API local seleccionando el método de preferencia.</p>
        </div>
    </section>

    <!-- contenido principal -->
    <section class="section">
        <div class="exercise-grid">
            
            <div class="exercise-card" style="margin-top: 0;">
                <h2 class="section-title">
                    <span class="badge-num">1</span>
                    Cargar lista de usuarios
                </h2>
                <p class="section-subtitle">Elegí la librería y presioná el botón para disparar el request.</p>

                <!-- Selector de método -->
                <div class="method-selector">
                    <label>
                        <input type="radio" name="metodo_carga" value="fetch" checked>
                        <div class="method-toggle-btn">Fetch API</div>
                    </label>
                    <label>
                        <input type="radio" name="metodo_carga" value="axios">
                        <div class="method-toggle-btn">Axios</div>
                    </label>
                </div>

                <div style="margin-bottom: 2rem;">
                    <button class="btn btn-primary" id="btn-cargar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Cargar usuarios
                    </button>
                </div>

                <div class="output-box" id="output-box">
                    <div class="output-empty">Hacé clic en el botón para obtener los usuarios</div>
                </div>
            </div>

            <!-- Consola afuera -->
            <div class="console-sidebar">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <h3 style="font-size: 0.75rem; font-weight: 600; margin: 0; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em;">Consola de red</h3>
                    <button class="btn-clear-console" onclick="document.getElementById('consola-ej1').innerHTML=''">Limpiar</button>
                </div>
                <div class="console-box" id="consola-ej1"></div>
            </div>

        </div>
    </section>

    <button class="btn-scroll-top" id="btn-scroll-top" aria-label="Ir arriba">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script type="module">
        import { iniciarTema, toggleTema } from '../Context/tema.js';
        import { iniciarScrollTop, getIniciales, mostrarToast, logConsole, limpiarConsole } from '../modules/utils.js';

        iniciarTema();
        iniciarScrollTop();
        document.getElementById('btn-tema').addEventListener('click', toggleTema);

        const API_URL = '/api/usuarios';

        // renderizo los usuarios como tarjetas
        function renderUsuarios(usuarios) {
            const contenedor = document.getElementById('output-box');
            contenedor.innerHTML = '';
            
            // Le quitamos el padding para que la grilla ocupe todo el ancho sin verse encerrada en la caja si hay resultados
            contenedor.style.padding = '0';
            contenedor.style.border = 'none';
            contenedor.style.background = 'transparent';

            if (!usuarios || usuarios.length === 0) {
                contenedor.style.padding = '2rem';
                contenedor.style.border = '1px dashed var(--border)';
                contenedor.style.background = 'var(--bg-secondary)';
                contenedor.innerHTML = '<div class="output-empty">No hay usuarios para mostrar</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'users-grid';

            usuarios.forEach(usuario => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.innerHTML = `
                    <div class="user-avatar">${getIniciales(usuario.nombre)}</div>
                    <div class="user-name">${usuario.nombre}</div>
                    <div class="user-email">${usuario['correo electrónico']}</div>
                `;
                grid.appendChild(card);
            });

            contenedor.appendChild(grid);
        }

        // muestro un estado de carga
        function mostrarCargando() {
            const contenedor = document.getElementById('output-box');
            contenedor.style.padding = '2rem';
            contenedor.style.border = '1px dashed var(--border)';
            contenedor.style.background = 'var(--bg-secondary)';
            contenedor.innerHTML = `
                <div class="output-empty">
                    <div class="spinner" style="margin: 0 auto 1rem; width: 20px; height: 20px;"></div>
                    <div>Cargando usuarios...</div>
                </div>
            `;
        }

        // click en el botón de carga único
        document.getElementById('btn-cargar').addEventListener('click', async () => {
            const btn = document.getElementById('btn-cargar');
            const metodo = document.querySelector('input[name="metodo_carga"]:checked').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Cargando...';
            mostrarCargando();
            
            limpiarConsole('consola-ej1');
            logConsole('consola-ej1', `Iniciando request con ${metodo.toUpperCase()}...`, 'info');
            logConsole('consola-ej1', `Endpoint: GET ${API_URL}`, 'info');

            try {
                let usuarios = [];

                if (metodo === 'fetch') {
                    const respuesta = await fetch(API_URL);
                    logConsole('consola-ej1', `Response status: ${respuesta.status} ${respuesta.statusText}`, 'success');
                    if (!respuesta.ok) throw new Error(`Error HTTP: ${respuesta.status}`);
                    
                    logConsole('consola-ej1', 'Parseando JSON (respuesta.json())...', 'info');
                    usuarios = await respuesta.json();
                } else {
                    const respuesta = await axios.get(API_URL);
                    logConsole('consola-ej1', `Response status: ${respuesta.status} ${respuesta.statusText}`, 'success');
                    logConsole('consola-ej1', 'Axios parsea el JSON automaticamente (.data)', 'info');
                    usuarios = respuesta.data;
                }

                logConsole('consola-ej1', `Se recibieron ${usuarios.length} usuarios. Renderizando UI.`, 'success');
                renderUsuarios(usuarios);
                mostrarToast(`Datos cargados usando ${metodo}`, 'success');

            } catch (error) {
                logConsole('consola-ej1', `Excepcion atrapada: ${error.message}`, 'error');
                const contenedor = document.getElementById('output-box');
                contenedor.style.padding = '2rem';
                contenedor.style.border = '1px dashed var(--error)';
                contenedor.style.background = 'var(--error-bg)';
                contenedor.innerHTML = `
                    <div class="output-empty" style="color: var(--error);">
                        Error al obtener los datos: ${error.message}
                    </div>
                `;
                mostrarToast('Ocurrió un error', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Cargar usuarios';
                logConsole('consola-ej1', 'Proceso terminado.', 'info');
            }
        });
        
        // resetear al cambiar el metodo
        document.querySelectorAll('input[name="metodo_carga"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const contenedor = document.getElementById('output-box');
                contenedor.style.padding = '2rem';
                contenedor.style.border = '1px dashed var(--border)';
                contenedor.style.background = 'var(--bg-secondary)';
                contenedor.innerHTML = '<div class="output-empty">Hacé clic en el botón para obtener los usuarios</div>';
                limpiarConsole('consola-ej1');
                logConsole('consola-ej1', `Metodo cambiado a ${radio.value.toUpperCase()}. Listo para cargar.`, 'info');
            });
        });
    </script>
</body>
</html>
