<!DOCTYPE html>
<html lang="es" class="pagina-pacman">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PacMan — Escape Escolar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/pacman.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="btn btn-outline-light btn-sm me-2" href="/">← Volver al Inicio</a>
      <a class="navbar-brand" href="/pacman">👻 PacMan</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navPac" aria-label="Menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navPac">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="/snake">Snake</a></li>
          <li class="nav-item"><a class="nav-link active" href="/pacman">PacMan</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-3">
    <div class="hud-pacman">
      <div>Estudiante: <span id="hudPacNombre">—</span></div>
      <div>Puntaje: <span id="hudPacPuntaje">0</span></div>
      <div>Nivel: <span id="hudPacNivel">1</span></div>
      <div>Vidas: <span id="hudPacVidas">3</span></div>
      <div>Apuntes: <span id="hudPacApuntes">0</span></div>
    </div>

    <div id="mensajeNivelPacman" class="d-none"></div>

    <div id="canvasContainerPacman">
      <canvas id="canvasPacman"></canvas>
    </div>

    <p class="instrucciones-teclado text-center text-secondary small">
      Flechas para mover al estudiante
    </p>

    <div class="controles-dpad" aria-label="Controles direccionales">
      <button type="button" class="btn-up" data-dir="up" aria-label="Arriba">↑</button>
      <button type="button" class="btn-left" data-dir="left" aria-label="Izquierda">←</button>
      <button type="button" class="btn-right" data-dir="right" aria-label="Derecha">→</button>
      <button type="button" class="btn-down" data-dir="down" aria-label="Abajo">↓</button>
    </div>
  </main>

  <div class="modal fade" id="modalModoPacman" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header"><h5 class="modal-title">Modo de juego</h5></div>
        <div class="modal-body d-grid gap-2">
          <button class="btn btn-warning" id="btnPacIndividual">Un Jugador</button>
          <button class="btn btn-outline-warning" id="btnPacCoop">Cooperativo</button>
          <button class="btn btn-outline-warning" id="btnPacVersus">Versus</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalRegistroPacman" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header"><h5 class="modal-title">Registro</h5></div>
        <div class="modal-body">
          <label for="inputNombrePacman" class="form-label">Nombre del estudiante</label>
          <input type="text" class="form-control" id="inputNombrePacman"
            required minlength="3" maxlength="20"
            pattern="[a-záéíóúüñA-ZÁÉÍÓÚÜÑ\s]{3,20}"
            autocomplete="name">
          <div class="invalid-feedback">Solo letras, entre 3 y 20 caracteres.</div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-warning" id="btnConfirmarPacman" disabled>Entrar al colegio</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalFinPacman" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light text-center">
        <div class="modal-header border-0"><h5 class="modal-title">Fin de partida</h5></div>
        <div class="modal-body">
          <p>Puntaje: <strong id="finPuntaje">0</strong></p>
        </div>
        <div class="modal-footer justify-content-center border-0">
          <button class="btn btn-warning" id="btnReintentarPacman">Reintentar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module">
    import { iniciarPacman } from '/modules/pacman/pacmanGame.js';
    document.getElementById('btnReintentarPacman')
      ?.addEventListener('click', () => location.reload());
    iniciarPacman();
  </script>
</body>
</html>
