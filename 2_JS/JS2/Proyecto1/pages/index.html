<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJS4 — Colector de Números</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts: Bricolage Grotesque & Fira Code -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="/public/styles/estilos.css">
</head>
<body class="bg-neon">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-accent sticky-top bg-surface">
        <div class="container">
            <a class="navbar-brand fw-bold text-glow" href="#">
                <span class="text-accent">NJS4</span> — Colector de Números
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link active">Laboratorio de Datos</span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4 contenedor-principal">
            
            <!-- Panel Izquierdo: Entrada y Estadísticas -->
            <div class="col-lg-5 panel-izquierdo">
                
                <!-- Sección de Ingreso -->
                <div class="card card-neon mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-4 text-accent">Ingreso de Datos</h5>
                        <div class="d-flex gap-2">
                            <input type="text" id="inputNumero" class="form-control input-neon" placeholder="Ej: 42.5" autocomplete="off">
                            <button id="btnAgregar" class="btn btn-accent px-4">Agregar</button>
                        </div>
                        <div id="mensajeError" class="error-text mt-2"></div>
                    </div>
                </div>

                <!-- Sección de Estadísticas -->
                <div class="card card-neon mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-4 text-accent">Estadísticas en Tiempo Real</h5>
                        <div class="row g-3 panel-estadisticas">
                            <div class="col-6">
                                <div class="stat-item">
                                    <label>Promedio</label>
                                    <div id="statsPromedio" class="stat-valor">—</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-item">
                                    <label>Suma Total</label>
                                    <div id="statsSuma" class="stat-valor">—</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-item">
                                    <label>Mínimo</label>
                                    <div id="statsMinimo" class="stat-valor">—</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-item">
                                    <label>Máximo</label>
                                    <div id="statsMaximo" class="stat-valor">—</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Botones de Acción Global -->
                <div class="d-grid gap-2">
                    <button id="btnExportar" class="btn btn-primary btn-lg btn-exportar" disabled title="Necesitás al menos 10 números">
                        Exportar a .txt
                    </button>
                    <button id="btnLimpiar" class="btn btn-outline-danger">
                        Limpiar Laboratorio
                    </button>
                </div>
            </div>

            <!-- Panel Derecho: Lista de Números -->
            <div class="col-lg-7 panel-derecho">
                <div class="card card-neon h-100">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title m-0 text-accent">Lista de Colección</h5>
                            <span id="contadorTexto" class="badge contador-badge">0 / 20 números</span>
                        </div>

                        <!-- Barra de Progreso -->
                        <div class="progress bg-dark-soft mb-4" style="height: 8px;">
                            <div id="barraProgreso" class="progress-bar progress-bar-striped progress-bar-animated bg-accent" role="progressbar" style="width: 0%"></div>
                        </div>

                        <!-- Contenedor de la Lista -->
                        <div class="flex-grow-1 position-relative list-container">
                            <ul id="listaNumeros" class="list-unstyled custom-scroll">
                                <!-- Elementos inyectados por JS -->
                            </ul>
                            
                            <!-- Estado Vacío -->
                            <div id="estadoVacio" class="empty-state text-center py-5">
                                <div class="empty-icon mb-3">⬚</div>
                                <p class="text-muted">No hay números en la colección.<br>Ingresa un valor para comenzar.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Contenedor de Toasts (Notificaciones) -->
    <div id="contenedorToast" class="toast-container-custom"></div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Scripts de la Aplicación -->
    <script src="/scripts/estado.js"></script>
    <script src="/scripts/validador.js"></script>
    <script src="/scripts/renderizador.js"></script>
    <script src="/scripts/app.js"></script>
</body>
</html>
