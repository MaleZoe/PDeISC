<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P1 — Colector de Datos (Estanga Protocol)</title>
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
    
    <!-- los estilos del modo oscuro/claro -->
    <link id="theme-link" rel="stylesheet" href="/styles/dark.css">
    <link rel="stylesheet" href="/styles/estilos.css">

    <style>
      
        #btnArriba {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            z-index: 99;
            border-radius: 50%;
            width: 50px;
            height: 50px;
        }
        
        /* switch de modo */
        .theme-switch {
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--color-borde);
            background: var(--color-superficie);
            color: var(--color-texto-principal);
        }
    </style>
</head>
<body class="bg-neon">

    <!-- cabecera -->
    <nav id="mainNav" class="navbar navbar-expand-lg navbar-dark border-bottom border-accent sticky-top bg-surface">
        <div class="container">
            <a class="navbar-brand fw-bold text-glow" href="#">
                — Colector
            </a>
            
            <div class="ms-auto d-flex align-items-center gap-3">
                <button id="toggleTheme" class="theme-switch">Modo Claro</button>
                <span class="nav-link text-accent d-none d-md-block">Lab de Datos</span>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4 contenedor-principal">
            
            <!-- panel izquierdo: entrada -->
            <div class="col-lg-5">
                <div class="card card-neon mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3 text-accent">Ingreso de Datos</h5>
                        
                        <!-- label obligatorio sin placeholder -->
                        <div class="mb-3">
                            <label for="inputNumero" class="form-label text-secondary small">Ingrese el valor numerico:</label>
                            <div class="d-flex gap-2">
                                <input type="number" id="inputNumero" class="form-control input-neon" autocomplete="off" step="any" required>
                                <button id="btnAgregar" class="btn btn-accent px-4">Cargar</button>
                            </div>
                            <div id="mensajeError" class="error-text mt-2"></div>
                        </div>
                    </div>
                </div>

                <!-- estadisticas -->
                <div class="card card-neon mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-4 text-accent">Estadisticas</h5>
                        <div class="row g-3">
                            <div class="col-6">
                                <div class="stat-item">
                                    <label>Promedio</label>
                                    <div id="statsPromedio" class="stat-valor">—</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-item">
                                    <label>Suma</label>
                                    <div id="statsSuma" class="stat-valor">—</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-item">
                                    <label>Minimo</label>
                                    <div id="statsMinimo" class="stat-valor">—</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-item">
                                    <label>Maximo</label>
                                    <div id="statsMaximo" class="stat-valor">—</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button id="btnExportar" class="btn btn-primary btn-lg btn-exportar" disabled>
                        Exportar a .txt
                    </button>
                    <button id="btnLimpiar" class="btn btn-outline-danger">
                        Limpiar Todo
                    </button>
                </div>
            </div>

            <!-- panel derecho: lista -->
            <div class="col-lg-7">
                <div class="card card-neon h-100">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="card-title m-0 text-accent">Coleccion</h5>
                            <span id="contadorTexto" class="badge contador-badge">0 / 20</span>
                        </div>

                        <div class="progress bg-dark-soft mb-4" style="height: 6px;">
                            <div id="barraProgreso" class="progress-bar bg-accent" role="progressbar" style="width: 0%"></div>
                        </div>

                        <div class="flex-grow-1 position-relative list-container">
                            <ul id="listaNumeros" class="list-unstyled custom-scroll"></ul>
                            
                            <div id="estadoVacio" class="empty-state text-center py-5">
                                <div class="empty-icon mb-3">⬚</div>
                                <p class="text-muted">No hay nada aca todavia.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- boton para subir -->
    <button id="btnArriba" class="btn btn-accent shadow">↑</button>

    <!-- notificaciones -->
    <div id="contenedorToast" class="toast-container-custom"></div>

    <!-- bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- modo oscuro y claro -->
    <script>
        const btnTheme = document.getElementById('toggleTheme');
        const themeLink = document.getElementById('theme-link');
        const mainNav = document.getElementById('mainNav');
        
        btnTheme.addEventListener('click', () => {
            if (themeLink.getAttribute('href') === '/styles/dark.css') {
                themeLink.setAttribute('href', '/styles/light.css');
                document.documentElement.setAttribute('data-theme', 'light');
                btnTheme.textContent = 'Modo Oscuro';
                mainNav.classList.replace('navbar-dark', 'navbar-light');
            } else {
                themeLink.setAttribute('href', '/styles/dark.css');
                document.documentElement.setAttribute('data-theme', 'dark');
                btnTheme.textContent = 'Modo Claro';
                mainNav.classList.replace('navbar-light', 'navbar-dark');
            }
        });

        // boton de subir
        const btnArriba = document.getElementById('btnArriba');
        window.onscroll = () => {
            if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
                btnArriba.style.display = "block";
            } else {
                btnArriba.style.display = "none";
            }
        };
        btnArriba.onclick = () => {
            window.scrollTo({top: 0, behavior: 'smooth'});
        };
    </script>

    <!-- el script principal como modulo -->
    <script type="module" src="/scripts/app.js"></script>
</body>
</html>
