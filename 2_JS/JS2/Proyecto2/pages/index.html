<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2 — Filtrado de Datos (Estanga Protocol)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="theme-link" rel="stylesheet" href="/styles/dark.css">
  <link rel="stylesheet" href="/styles/estilos.css">
</head>
<body>
  <nav id="mainNav" class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
    <div class="container">
      <span class="navbar-brand text-glow text-accent">— Filtro de Datos</span>
      <button id="toggleTheme" class="btn btn-outline-light btn-sm">Modo Claro</button>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row">
      <div class="col-md-6">
          <div class="card-estanga">
            <h5 class="d-flex justify-content-between align-items-center">
              Carga de Datos
              <button id="btnRefrescarServer" class="btn btn-sm btn-outline-accent">Refrescar</button>
            </h5>
            <div id="zonaCarga" class="zona-carga mt-3" onclick="document.getElementById('fileInput').click()">
              <p>Arrastra el .txt aca o hace click</p>
              <input type="file" id="fileInput" hidden accept=".txt">
            </div>
            <div class="mt-2 small">Archivo: <span id="nombreArchivo">Ninguno</span></div>

            <!-- UNIFICADO: Seleccion de archivos en servidores -->
            <div class="mt-3 pt-3 border-top border-secondary">
              <label class="small text-secondary-custom mb-1">Archivos en el Servidor:</label>
              <div class="d-flex gap-2">
                <select id="selectServer" class="form-select bg-dark text-light border-secondary">
                  <option value="">Seleccione...</option>
                </select>
                <button id="btnCargarServer" class="btn btn-accent btn-sm" disabled>Cargar</button>
              </div>
            </div>
          </div>

        <div class="card-estanga">
          <h5>Estadisticas</h5>
          <div class="row mt-3">
            <div class="col-6 mb-3">
              <label class="text-secondary-custom small">Total Leidos</label>
              <div id="statTotal" class="h4">0</div>
            </div>
            <div class="col-6 mb-3">
              <label class="text-secondary-custom small">Utiles</label>
              <div id="statUtiles" class="h4 text-accent text-glow">0</div>
            </div>
            <div class="col-6">
              <label class="text-secondary-custom small">Descartados</label>
              <div id="statDescartados" class="h4 text-danger">0</div>
            </div>
            <div class="col-6">
              <label class="text-secondary-custom small">Porcentaje</label>
              <div id="statPorcentaje" class="h4">0%</div>
            </div>
          </div>
        </div>

        <button id="btnExportar" class="btn btn-primary w-100 py-3" disabled>Exportar Resultados</button>
      </div>

      <div class="col-md-6">
        <div class="card-estanga mt-4">
          <h5>Numeros Utiles (Filtrados)</h5>
          <ul id="listaUtiles" class="list-unstyled mt-3 custom-scroll" style="max-height: 250px; overflow-y: auto;">
            <li class="text-muted text-center py-4">No hay datos</li>
          </ul>
        </div>

        <div class="card-estanga mt-4">
          <h5>Numeros Factoriales</h5>
          <div id="contenedorFactoriales" class="mt-3">
             <p class="text-muted text-center py-3">Carga un archivo para ver si hay factoriales</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <button id="btnArriba" class="btn btn-primary position-fixed bottom-0 end-0 m-4 shadow" style="display:none">↑</button>

  <div id="contenedorToast" class="toast-container-custom"></div>

  <script>
    const btnTheme = document.getElementById('toggleTheme');
    const themeLink = document.getElementById('theme-link');
    const mainNav = document.getElementById('mainNav');

    btnTheme.addEventListener('click', () => {
      if (themeLink.getAttribute('href') === '/styles/dark.css') {
        themeLink.setAttribute('href', '/styles/light.css');
        document.documentElement.setAttribute('data-theme', 'light');
        btnTheme.textContent = 'Modo Oscuro';
        btnTheme.classList.replace('btn-outline-light', 'btn-outline-dark');
        mainNav.classList.replace('navbar-dark', 'navbar-light');
        mainNav.classList.replace('bg-dark', 'bg-light');
      } else {
        themeLink.setAttribute('href', '/styles/dark.css');
        document.documentElement.setAttribute('data-theme', 'dark');
        btnTheme.textContent = 'Modo Claro';
        btnTheme.classList.replace('btn-outline-dark', 'btn-outline-light');
        mainNav.classList.replace('navbar-light', 'navbar-dark');
        mainNav.classList.replace('bg-light', 'bg-dark');
      }
    });

    const btnArriba = document.getElementById('btnArriba');
    window.onscroll = () => {
      if (window.scrollY > 100) btnArriba.style.display = 'block';
      else btnArriba.style.display = 'none';
    };
    btnArriba.onclick = () => window.scrollTo({top:0, behavior:'smooth'});
    // --- LOGICA SERVIDORES UNIFICADA (P1 + P2) ---
    const selectServer = document.getElementById('selectServer');
    const btnCargarServer = document.getElementById('btnCargarServer');
    const btnRefrescarServer = document.getElementById('btnRefrescarServer');

    async function cargarArchivos() {
        selectServer.innerHTML = '<option value="">Cargando...</option>';
        try {
            // Busco en ambos servers por separado para que si uno falla el otro siga
            const fetchP1 = fetch('/archivos-p1').then(r => r.json()).catch(() => ({ok:false}));
            const fetchLocal = fetch('/archivos-locales').then(r => r.json()).catch(() => ({ok:false}));
            
            const [resP1, resLocal] = await Promise.all([fetchP1, fetchLocal]);

            selectServer.innerHTML = '<option value="">Seleccione...</option>';
            
            // Agrego los locales (que ahora vienen filtrados del back)
            if (resLocal.ok && resLocal.archivos) {
                resLocal.archivos.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = 'LOCAL:' + f;
                    opt.textContent = '[LOCAL] ' + f;
                    selectServer.appendChild(opt);
                });
            }

            // Agrego los de P1
            if (resP1.ok && resP1.archivos) {
                resP1.archivos.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = 'P1:' + f;
                    opt.textContent = '[P1] ' + f;
                    selectServer.appendChild(opt);
                });
            }
            
            if (selectServer.options.length <= 1) {
                selectServer.innerHTML = '<option value="">No hay archivos</option>';
            }
        } catch (err) { 
            console.error("Error cargando archivos:", err); 
            selectServer.innerHTML = '<option value="">Error al cargar</option>';
        }
    }

    selectServer.addEventListener('change', () => {
        btnCargarServer.disabled = !selectServer.value;
    });

    btnRefrescarServer.addEventListener('click', () => {
        // el usuario quiere refrescar TODO
        document.getElementById('nombreArchivo').textContent = 'Ninguno';
        selectServer.value = '';
        btnCargarServer.disabled = true;
        
        // aviso a app.js que limpie el estado y la vista
        window.dispatchEvent(new CustomEvent('reiniciarApp'));
        
        cargarArchivos();
    });
    
    // Al cargar la pagina
    cargarArchivos();

    // Listener global para que app.js pueda pedir refresco
    window.addEventListener('actualizarListas', cargarArchivos);

    btnCargarServer.addEventListener('click', () => {
        const value = selectServer.value;
        if (!value) return;
        const [tipo, nombre] = value.split(':');
        const evento = tipo === 'P1' ? 'procesarP1' : 'procesarLocal';
        window.dispatchEvent(new CustomEvent(evento, { detail: { nombre } }));
    });
  </script>
  <script type="module" src="/scripts/app.js"></script>
</body>
</html>
