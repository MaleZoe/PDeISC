<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2 — Filtrado de Datos (Estanga Protocol)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link id="theme-link" rel="stylesheet" href="/styles/dark.css">
  <link rel="stylesheet" href="/styles/estilos.css">
</head>
<body>
  <nav id="mainNav" class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
    <div class="container">
      <span class="navbar-brand text-glow text-accent">— Filtro de Datos</span>
      <button id="toggleTheme" class="btn btn-outline-light btn-sm">Modo Claro</button>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row">
      <div class="col-md-6">
          <div class="card-estanga">
            <h5 class="d-flex justify-content-between align-items-center">
              Carga de Datos
              <div class="d-flex gap-1">
                <button id="btnRefrescarLocal" class="btn btn-xs btn-outline-accent" title="Refrescar Local">Ref. Local</button>
                <button id="btnRefrescarP1" class="btn btn-xs btn-outline-accent" title="Refrescar P1">Ref. P1</button>
              </div>
            </h5>
            <div id="zonaCarga" class="zona-carga mt-3" onclick="document.getElementById('fileInput').click()">
              <p>Arrastra el .txt aca o hace click</p>
              <input type="file" id="fileInput" hidden accept=".txt">
            </div>
            <div class="mt-2 small">Archivo: <span id="nombreArchivo">Ninguno</span></div>

            <div class="row g-2 mt-2">
              <!-- Seleccion Local -->
              <div class="col-12 mt-3 pt-3 border-top border-secondary">
                <label class="small text-secondary-custom mb-1">Servidor Local (P2):</label>
                <div class="d-flex gap-2">
                  <select id="selectLocal" class="form-select bg-dark text-light border-secondary">
                    <option value="">Seleccione...</option>
                  </select>
                  <button id="btnCargarLocal" class="btn btn-outline-accent btn-sm" disabled>Cargar</button>
                </div>
              </div>

              <!-- Seleccion P1 -->
              <div class="col-12 mt-2 pt-2 border-top border-secondary">
                <label class="small text-secondary-custom mb-1">Servidor Remoto (P1):</label>
                <div class="d-flex gap-2">
                  <select id="selectP1" class="form-select bg-dark text-light border-secondary">
                    <option value="">Seleccione...</option>
                  </select>
                  <button id="btnCargarP1" class="btn btn-accent btn-sm" disabled>Cargar</button>
                </div>
              </div>
            </div>
          </div>

        <div class="card-estanga">
          <h5>Estadisticas</h5>
          <div class="row mt-3">
            <div class="col-6 mb-3">
              <label class="text-secondary-custom small">Total Leidos</label>
              <div id="statTotal" class="h4">0</div>
            </div>
            <div class="col-6 mb-3">
              <label class="text-secondary-custom small">Utiles</label>
              <div id="statUtiles" class="h4 text-accent text-glow">0</div>
            </div>
            <div class="col-6">
              <label class="text-secondary-custom small">Descartados</label>
              <div id="statDescartados" class="h4 text-danger">0</div>
            </div>
            <div class="col-6">
              <label class="text-secondary-custom small">Porcentaje</label>
              <div id="statPorcentaje" class="h4">0%</div>
            </div>
          </div>
        </div>

        <button id="btnExportar" class="btn btn-primary w-100 py-3" disabled>Exportar Resultados</button>
      </div>

      <div class="col-md-6">
        <div class="card-estanga mt-4">
          <h5>Numeros Utiles (Filtrados)</h5>
          <ul id="listaUtiles" class="list-unstyled mt-3 custom-scroll" style="max-height: 250px; overflow-y: auto;">
            <li class="text-muted text-center py-4">No hay datos</li>
          </ul>
        </div>

        <div class="card-estanga mt-4">
          <h5>Numeros Factoriales</h5>
          <div id="contenedorFactoriales" class="mt-3">
             <p class="text-muted text-center py-3">Carga un archivo para ver si hay factoriales</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <button id="btnArriba" class="btn btn-primary position-fixed bottom-0 end-0 m-4 shadow" style="display:none">↑</button>

  <div id="contenedorToast" class="toast-container-custom"></div>

  <script>
    const btnTheme = document.getElementById('toggleTheme');
    const themeLink = document.getElementById('theme-link');
    const mainNav = document.getElementById('mainNav');

    btnTheme.addEventListener('click', () => {
      if (themeLink.getAttribute('href') === '/styles/dark.css') {
        themeLink.setAttribute('href', '/styles/light.css');
        document.documentElement.setAttribute('data-theme', 'light');
        btnTheme.textContent = 'Modo Oscuro';
        btnTheme.classList.replace('btn-outline-light', 'btn-outline-dark');
        mainNav.classList.replace('navbar-dark', 'navbar-light');
        mainNav.classList.replace('bg-dark', 'bg-light');
      } else {
        themeLink.setAttribute('href', '/styles/dark.css');
        document.documentElement.setAttribute('data-theme', 'dark');
        btnTheme.textContent = 'Modo Claro';
        btnTheme.classList.replace('btn-outline-dark', 'btn-outline-light');
        mainNav.classList.replace('navbar-light', 'navbar-dark');
        mainNav.classList.replace('bg-light', 'bg-dark');
      }
    });

    const btnArriba = document.getElementById('btnArriba');
    window.onscroll = () => {
      if (window.scrollY > 100) btnArriba.style.display = 'block';
      else btnArriba.style.display = 'none';
    };
    btnArriba.onclick = () => window.scrollTo({top:0, behavior:'smooth'});
    // --- LOGICA P1 INTEGRATION ---
    const selectP1 = document.getElementById('selectP1');
    const btnCargarP1 = document.getElementById('btnCargarP1');
    const btnRefrescarP1 = document.getElementById('btnRefrescarP1');

    async function cargarArchivosP1() {
        try {
            const res = await fetch('/archivos-p1');
            if (!res.ok) throw new Error("Endpoint no encontrado");
            const data = await res.json();
            if (data.ok) {
                selectP1.innerHTML = '<option value="">Seleccione...</option>';
                data.archivos.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f;
                    opt.textContent = f;
                    selectP1.appendChild(opt);
                });
            }
        } catch (err) { console.error("Error cargando P1:", err); }
    }

    selectP1.addEventListener('change', () => {
        btnCargarP1.disabled = !selectP1.value;
    });

    btnRefrescarP1.addEventListener('click', cargarArchivosP1);

    // --- NUEVO: LOGICA LOCAL (P2) INTEGRATION ---
    const selectLocal = document.getElementById('selectLocal');
    const btnCargarLocal = document.getElementById('btnCargarLocal');
    const btnRefrescarLocal = document.getElementById('btnRefrescarLocal');

    async function cargarArchivosLocales() {
        try {
            const res = await fetch('/archivos-locales');
            if (!res.ok) throw new Error("Endpoint no encontrado");
            const data = await res.json();
            if (data.ok) {
                selectLocal.innerHTML = '<option value="">Seleccione...</option>';
                data.archivos.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f;
                    opt.textContent = f;
                    selectLocal.appendChild(opt);
                });
            }
        } catch (err) { console.error("Error cargando Local:", err); }
    }

    selectLocal.addEventListener('change', () => {
        btnCargarLocal.disabled = !selectLocal.value;
    });

    btnRefrescarLocal.addEventListener('click', cargarArchivosLocales);
    
    // Al cargar la pagina, busco los archivos de P1 y Local
    cargarArchivosP1();
    cargarArchivosLocales();

    // El procesamiento lo manejamos desde app.js mediante eventos custom
    btnCargarP1.addEventListener('click', () => {
        const nombre = selectP1.value;
        if (!nombre) return;
        window.dispatchEvent(new CustomEvent('procesarP1', { detail: { nombre } }));
    });

    btnCargarLocal.addEventListener('click', () => {
        const nombre = selectLocal.value;
        if (!nombre) return;
        window.dispatchEvent(new CustomEvent('procesarLocal', { detail: { nombre } }));
    });
  </script>
  <script type="module" src="/scripts/app.js"></script>
</body>
</html>
