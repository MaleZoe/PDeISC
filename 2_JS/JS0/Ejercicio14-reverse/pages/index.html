<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14 - Método reverse()</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/public/styles/estilos.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-glass fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"> Ejercicio 14: reverse()</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo1">1. Letras</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo2">2. Números</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo3">3. Strings</a></li>
                </ul>
            </div>
        </div>
    </nav>
 
    <!-- Main Content -->
    <main class="container mt-5 pt-5 pb-5">
        
        <!-- Header -->
        <header class="text-center mb-5 mt-4">
            <h1 class="display-4 fw-bolder text-gradient">Método reverse()</h1>
            <p class="lead text-muted">Invierte el orden de los elementos <strong>in place</strong> (mutando el original).</p>
        </header>
 
        <!-- Demo 1: Letras -->
        <section id="demo1" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0">Demo 1: Invertir Letras</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="1">Reiniciar Demo</button>
                </div>
                
                <div class="mb-4 d-flex justify-content-start justify-content-start">
                    <div class="btn-group">
                        <button id="btnReverseLetrasDbl" class="btn btn-primary px-3" title="Doble clic">DblClick</button>
                        <button id="btnReverseLetrasDown" class="btn btn-primary px-3" title="Presionar clic">Down</button>
                    </div>
                </div>
                
                <div class="area-salida p-4 rounded border-primary border-opacity-25 bg-primary bg-opacity-10 text-center">
                    <h6 class="text-primary mb-3">Estado del Array</h6>
                    <div id="trackerBase1" class="tracker-contenedor d-flex flex-wrap gap-2 justify-content-center"></div>
                </div>
            </div>
        </section>
 
        <!-- Demo 2: Números -->
        <section id="demo2" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0">Demo 2: Números en Reversa</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="2">Reiniciar Demo</button>
                </div>
                
                <div class="row g-3 align-items-center mb-4">
                    <div class="col-auto">
                        <div class="btn-group">
                            <button id="btnReverseNumDbl" class="btn btn-info px-3" title="Doble clic">DblClick</button>
                            <button id="btnReverseNumDown" class="btn btn-info px-3" title="Presionar clic">Down</button>
                        </div>
                    </div>
                </div>
                
                <div class="area-salida p-4 rounded border-info border-opacity-25 bg-info bg-opacity-10 text-center">
                    <h6 class="text-info mb-3 small fw-bold">ESTADO ACTUAL</h6>
                    <div id="trackerBase2" class="tracker-contenedor d-flex flex-wrap gap-2 justify-content-center"></div>
                </div>
            </div>
        </section>
 
        <!-- Demo 3: Palíndromos -->
        <section id="demo3" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0">Demo 3: Invertir Strings</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="3">Reiniciar Demo</button>
                </div>
                
                <div class="row g-3 align-items-center mb-4">
                    <div class="col-md-8">
                        <input type="text" id="inputString" class="form-control glass-input" value="Anita lava la tina">
                    </div>
                    <div class="col-md-4">
                        <div class="btn-group">
                            <button id="btnReverseStrDbl" class="btn btn-success px-3" title="Doble clic">DblClick</button>
                            <button id="btnReverseStrDown" class="btn btn-success px-3" title="Presionar clic">Down</button>
                        </div>
                    </div>
                </div>
                
                <div class="area-salida p-4 rounded border-success border-opacity-25 bg-success bg-opacity-10 text-center">
                    <div id="trackerResultado3" class="display-5 fw-bold text-light">...</div>
                </div>
            </div>
        </section>
    </main>
 
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="/scripts/app.js"></script>
</body>
</html>
