<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - Método sort()</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/public/styles/estilos.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-glass fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"> Ejercicio 13: sort()</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo1">1. Números</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo2">2. Palabras</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo3">3. Objetos</a></li>
                </ul>
            </div>
        </div>
    </nav>
 
    <!-- Main Content -->
    <main class="container mt-5 pt-5 pb-5">
        
        <!-- Header -->
        <header class="text-center mb-5 mt-4">
            <h1 class="display-4 fw-bolder text-gradient">Método sort()</h1>
            <p class="lead text-muted">Ordena los elementos de un array y lo devuelve.</strong></p>
        </header>
 
        <!-- Demo 1: Números -->
        <section id="demo1" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0">Demo 1: Ordenar Números</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="1">Reiniciar Demo</button>
                </div>
                
                <div class="mb-4 d-flex justify-content-start justify-content-start">
                    <div class="btn-group">
                        <button id="btnSortClick" class="btn btn-primary px-3" title="Click">Click</button>
                        <button id="btnSortHover" class="btn btn-primary px-3" title="Pasar el mouse">Hover</button>
                        <button id="btnSortDbl" class="btn btn-primary px-3" title="Doble clic">Doble Clic</button>
                    </div>
                </div>
                
                <div class="area-salida p-4 rounded border-primary border-opacity-25 bg-primary bg-opacity-10">
                    <h6 class="text-primary mb-3">Array de Trabajo</h6>
                    <div id="trackerBase1" class="tracker-contenedor d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </section>
 
        <!-- Demo 2: Palabras -->
        <section id="demo2" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0">Demo 2: Orden Alfabético</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="2">Reiniciar Demo</button>
                </div>
                
                <div class="row g-3 align-items-center mb-4">
                    <div class="col-auto">
                        <div class="btn-group">
                            <button id="btnSortAZClick" class="btn btn-info px-3" title="Click">Click</button>
                            <button id="btnSortAZHover" class="btn btn-info px-3" title="Pasar el mouse">Hover</button>
                            <button id="btnSortAZDbl" class="btn btn-info px-3" title="Doble clic">Doble Clic</button>
                        </div>
                    </div>
                </div>
                
                <div class="area-salida p-4 rounded border-info border-opacity-25 bg-info bg-opacity-10">
                    <h6 class="text-info mb-3">Array de Palabras</h6>
                    <div id="trackerBase2" class="tracker-contenedor d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </section>
 
        <!-- Demo 3: Objetos -->
        <section id="demo3" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0">Demo 3: Colecciones de Objetos</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="3">Reiniciar Demo</button>
                </div>
                
                <div class="mb-4 d-flex justify-content-start justify-content-start">
                    <div class="row g-3 align-items-center mb-4">
                        <div class="col-auto">
                            <select id="selectSortKey" class="form-select glass-input text-success fw-bold">
                                <option value="edad">Edad</option>
                                <option value="nombre">Nombre</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <div class="btn-group">
                                <button id="btnSortObjClick" class="btn btn-success px-3" title="Click">Click</button>
                                <button id="btnSortObjHover" class="btn btn-success px-3" title="Pasar el mouse">Hover</button>
                                <button id="btnSortObjDbl" class="btn btn-success px-3" title="Doble clic">Doble Clic</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="area-salida p-4 rounded border-success border-opacity-25 bg-success bg-opacity-10">
                    <h6 class="text-success mb-3">Usuarios Ordenados</h6>
                    <div id="trackerBase3" class="tracker-contenedor d-flex flex-wrap gap-2 justify-content-center"></div>
                </div>
            </div>
        </section>
    </main>
 
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="/scripts/app.js"></script>
</body>
</html>
