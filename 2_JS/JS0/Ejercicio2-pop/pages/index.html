<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Método pop()</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/public/styles/estilos.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-glass fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"> Ejercicio 2: pop()</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo1">Demo 1: Animales</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo2">Demo 2: Compras</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-auto-close" href="#demo3">Demo 3: Vaciar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 pt-5 pb-5">
        <header class="text-center mb-5 mt-4">
            <h1 class="display-4 fw-bolder text-gradient">Método pop()</h1>
            <p class="lead text-muted">Elimina el último elemento de un array y lo devuelve.</p>
        </header>

        <!-- Demo 1: Animales -->
        <section id="demo1" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0 text-white fw-bold">Demo 1: Animales</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="1">Reiniciar Demo</button>
                </div>
                
                <div class="mb-4 d-flex justify-content-start justify-content-start">
                    <div class="btn-group">
                        <button id="btnEliminarAnimalDbl" class="btn btn-info px-3" title="Doble clic">Doble Clic</button>
                        <button id="btnEliminarAnimalDown" class="btn btn-info px-3" title="Mantener presionado">Presionar</button>
                    </div>
                    
                </div>
                
                <div class="area-salida mt-4 p-3 rounded">
                    <h5 class="text-white fw-bold mb-3 opacity-75">Estado del Array:</h5>
                    <div id="trackerAnimales" class="tracker-contenedor d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </section>

        <!-- Demo 2: Lista de compras -->
        <section id="demo2" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0 text-white fw-bold">Demo 2: Lista de Compras</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="2">Reiniciar Demo</button>
                </div>
                
                <div class="mb-4 d-flex justify-content-start justify-content-start">
                    <div class="btn-group">
                        <button id="btnQuitarCompraDbl" class="btn btn-warning text-dark px-3 fw-bold" title="Doble clic">Doble Clic</button>
                        <button id="btnQuitarCompraDown" class="btn btn-warning text-dark px-3 fw-bold" title="Mantener presionado">Presionar</button>
                    </div>
                </div>
                
                <!-- Toast estilo banner inline -->
                

                <div class="area-salida mt-4 p-3 rounded">
                    <h5 class="text-white fw-bold mb-3 opacity-75">Estado del Array:</h5>
                    <div id="trackerCompras" class="tracker-contenedor d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </section>

        <!-- Demo 3: Vaciar con while -->
        <section id="demo3" class="demo-card card glass-card mb-5">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="card-title h4 m-0 text-white fw-bold">Demo 3: Vaciar con While</h2>
                    <button class="btn btn-outline-danger btn-sm btn-reiniciar" data-demo="3">Reiniciar Demo</button>
                </div>
                <div class="mb-4 d-flex justify-content-start justify-content-start">
                    <div class="btn-group">
                        <button id="btnVaciarDbl" class="btn btn-primary px-3" title="Doble clic">Doble Clic</button>
                        <button id="btnVaciarDown" class="btn btn-primary px-3" title="Mantener presionado">Presionar</button>
                    </div>
                </div>
                
                <div id="confettiContainer" class="text-center d-none mb-3">
                    <span class="fs-1">🎉 ¡Array vaciado! 🎉</span>
                </div>

                <div class="area-salida mt-4 p-3 rounded">
                    <h5 class="text-white fw-bold mb-3 opacity-75">Estado del Array:</h5>
                    <div id="trackerLetras" class="tracker-contenedor d-flex flex-wrap gap-2"></div>
                </div>
            </div>
        </section>
    </main>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="/scripts/app.js"></script>
</body>
</html>
